[package]
name = "gleaph-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "gleaph"
path = "src/main.rs"

[dependencies]
gleaph-types = { path = "../types" }
candid.workspace = true
clap = { version = "4", features = ["derive"] }
ic-agent = "0.46"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
anyhow = "1"
