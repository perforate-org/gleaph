[package]
name = "ic-stable-csr-canbench"
version = "0.1.0"
edition = "2024"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
candid = "0.10"
canbench-rs = "0.4"
gleaph-graph-store = { path = "../../graph-store" }
ic-cdk = "0.20"
ic-cdk-macros = "0.20"
ic-stable-csr = { path = "..", features = ["canbench-rs"] }
ic-stable-structures = "0.7.2"

# Own workspace so `canbench-rs` / `ic-cdk` do not enable `ic-stable-csr`'s `canbench-rs`
# feature for the main repo workspace (which would break host `cargo test`).
[workspace]
members = ["."]
resolver = "2"
