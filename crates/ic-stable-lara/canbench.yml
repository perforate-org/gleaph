# Optional comma-separated features after `canbench`, e.g. `bucket_row_grow_double` or
# `labeled_leaf_quota_16`, `labeled_leaf_quota_8`, `labeled_leaf_quota_4`, or
# `labeled_leaf_quota_1`.
# Used by `scripts/bench_bucket_row_grow_compare.sh`.
# Dedicated CARGO_TARGET_DIR (../../target/canbench) so the canbench wasm never clobbers the
# pocket-ic-e2e artifacts under ../../target (see crates/router/canbench.yml).
build_cmd: "sh -c 'EXTRA=\"${CANBENCH_IC_STABLE_LARA_FEATURES:-}\"; CARGO_TARGET_DIR=../../target/canbench cargo build --release --target wasm32-unknown-unknown --features canbench${EXTRA:+,}${EXTRA}'"
wasm_path: "../../target/canbench/wasm32-unknown-unknown/release/ic_stable_lara.wasm"
