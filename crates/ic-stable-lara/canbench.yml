# Optional comma-separated features after `canbench`, e.g. `bucket_row_grow_double`.
# Used by `scripts/bench_bucket_row_grow_compare.sh`.
build_cmd: "sh -c 'EXTRA=\"${CANBENCH_IC_STABLE_LARA_FEATURES:-}\"; CARGO_TARGET_DIR=../../target cargo build --release --target wasm32-unknown-unknown --features canbench${EXTRA:+,}${EXTRA}'"
wasm_path: "../../target/wasm32-unknown-unknown/release/ic_stable_lara.wasm"
