# canbench builds into a dedicated CARGO_TARGET_DIR (../../target/canbench) so its
# `--features canbench` wasm never clobbers the `--features pocket-ic-e2e` artifacts the
# pocket-ic-tests build.rs writes under ../../target. This keeps the final gate reproducible
# without any manual cross-feature rebuild of a shared artifact.
build_cmd: "CARGO_TARGET_DIR=../../target/canbench cargo build --release --target wasm32-unknown-unknown --locked --features canbench"
wasm_path: "../../target/canbench/wasm32-unknown-unknown/release/gleaph_router.wasm"
init_args:
  hex: "4449444c026c03d7e09b9002019fd5a4f70201c5fe8fd203686d68010001011dababababababababababababababababababababababababababababab00011dababababababababababababababababababababababababababababab"
