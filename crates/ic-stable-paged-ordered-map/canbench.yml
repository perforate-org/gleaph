# Dedicated CARGO_TARGET_DIR (../../target/canbench) so the canbench wasm never clobbers the
# pocket-ic-e2e artifacts under ../../target (see crates/router/canbench.yml).
build_cmd: "CARGO_TARGET_DIR=../../target/canbench cargo build -p ic-stable-paged-ordered-map --release --target wasm32-unknown-unknown --features canbench"
wasm_path: "../../target/canbench/wasm32-unknown-unknown/release/ic_stable_paged_ordered_map.wasm"
init_args:
  hex: "4449444c0000"
