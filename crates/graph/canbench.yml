# Paths are relative to this file’s directory (`crates/graph`). Baseline: `canbench --persist`.
# Executor benches use gleaph-graph-pma on real stable memory (wasm32) via `--features canbench-rs`.
build_cmd: "cargo build --release --target wasm32-unknown-unknown -p gleaph-graph --features canbench-rs"
wasm_path: "../../target/wasm32-unknown-unknown/release/gleaph_graph.wasm"
init_args:
  hex: "4449444c0000"
