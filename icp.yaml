# yaml-language-server: $schema=https://github.com/dfinity/icp-cli/raw/refs/tags/v1.0.0/docs/schemas/icp-yaml-schema.json

canisters:
  - name: gleaph-router
    recipe:
      type: "@dfinity/rust@v3.3.0"
      configuration:
        shrink: true
        features: batch-instr-log
        package: gleaph-router

  - name: gleaph-graph-index
    recipe:
      type: "@dfinity/rust@v3.3.0"
      configuration:
        shrink: true
        package: gleaph-graph-index

  - name: gleaph-graph-shard-0
    recipe:
      type: "@dfinity/rust@v3.3.0"
      configuration:
        shrink: true
        features: batch-instr-log
        package: gleaph-graph

  - name: gleaph-social-demo-gateway
    recipe:
      type: "@dfinity/rust@v3.3.0"
      configuration:
        shrink: true
        package: gleaph-social-demo-gateway

  - name: gleaph-vector
    recipe:
      type: "@dfinity/rust@v3.3.0"
      configuration:
        shrink: true
        package: gleaph-graph-vector-index

  - name: social-demo
    recipe:
      type: "@dfinity/asset-canister@v2.2.1"
      configuration:
        shrink: true
        dir: frontend/apps/social-demo/dist

  - name: knowledge-map
    recipe:
      type: "@dfinity/asset-canister@v2.2.1"
      configuration:
        shrink: true
        dir: frontend/apps/knowledge-map/dist

networks:
  # Override the local network with a docker network
  - name: local
    mode: managed
    image: ghcr.io/dfinity/icp-cli-network-launcher
    port-mapping:
      - 0:4943
