id: AliceHomeFeed
preparedQueryId: alice_home_feed
label: Alice home feed
shortLabel: Home
feedTitle: Alice's home feed
explanationTitle: Graph traversal
rdbSummary: |-
  An RDB needs a follows join table and a two-hop join (follower → followee → posts). The query is still SQL-shaped, but the relationship is now a traversal, not a foreign-key lookup.
graphSummary: |-
  Gleaph materializes `IN_HOME_FEED` edges from every public Post to each follower User at seed time, so Alice's feed is a single bounded expansion from her user vertex. The feed is ordered explicitly with `GLEAPH.SEQUENCE(e)` on the labeled feed edge, returning newest posts first with a deterministic, declared sort key rather than an implicit scan assumption.
preparedQuery: |-
  MATCH (u:User {demo_id: 1})<-[e:IN_HOME_FEED]-(p:Post)<-[:POSTED]-(author:User) WHERE p.is_public = TRUE RETURN p.demo_id AS post_id, author.name AS author_name, p.body AS body, p.created_at AS created_at ORDER BY GLEAPH.SEQUENCE(e) DESC LIMIT 20
semanticVector: null
