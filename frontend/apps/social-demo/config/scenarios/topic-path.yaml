id: TopicPath
preparedQueryId: topic_path_explanation
label: Topic path
shortLabel: Topic
feedTitle: Topic explanation path
explanationTitle: Explainable recommendation
rdbSummary: |-
  Proving why a post was recommended requires re-running and documenting the joins: follow, post, topic. The answer is scattered across tables.
graphSummary: |-
  Gleaph returns the same result plus the edge identities that caused it: Alice follows Bob, Bob authored the post, and that post has the Graph databases topic. The path is part of the query result.
preparedQuery: |-
  MATCH (p:Post)-[has_topic:HAS_TOPIC]->(t:Topic) WHERE t.demo_id = 13 MATCH (u:User)-[follows:FOLLOWS]->(author:User)-[posted:POSTED]->(p) WHERE u.demo_id = 1 RETURN p.demo_id AS post_id, author.name AS author_name, t.demo_id AS topic_id, p.body AS body, p.created_at AS created_at, ELEMENT_ID(follows) AS follows_edge_id, ELEMENT_ID(posted) AS posted_edge_id, ELEMENT_ID(has_topic) AS topic_edge_id
semanticVector: null
