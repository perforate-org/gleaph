id: PublicTimeline
preparedQueryId: public_timeline
label: Public timeline
shortLabel: Timeline
feedTitle: Public posts
rdbSummary: |-
  This is the straightforward RDB case: index public posts by created_at, apply the visibility condition, and read the newest rows. There is no meaningful relational advantage to demonstrate here; the important baseline is a simple, well-indexed table query.
graphSummary: |-
  Gleaph materializes `IN_PUBLIC_FEED` edges from each public Post to a Feed vertex, then reads one fixed-label edge stream. This is not presented as faster than the RDB baseline; it shows that the same Post/User/edge model can extend from a public timeline to relationship-aware feeds without introducing a separate feed schema.
preparedQuery: |-
  MATCH (feed:Feed {name: 'Public feed'})<-[e:IN_PUBLIC_FEED]-(p:Post)<-[:POSTED]-(author:User) OPTIONAL MATCH (p)-[:REPLY_TO]->(parent:Post)<-[:POSTED]-(parent_author:User) RETURN p.demo_id AS post_id, parent.demo_id AS parent_post_id, parent_author.name AS parent_author_name, parent.body AS parent_body, parent.created_at AS parent_created_at, author.name AS author_name, p.body AS body, p.created_at AS created_at ORDER BY GLEAPH.SEQUENCE(e) DESC LIMIT 20 OFFSET $offset
semanticVector: null
