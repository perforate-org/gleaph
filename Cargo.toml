[workspace]
members = [
    "crates/cli",
    "crates/gql",
    "crates/gql-executor",
    "crates/gql-ic",
    "crates/gql-macros",
    "crates/gql-planner",
    "crates/graph",
    "crates/graph-kernel",
    "crates/graph-registry",
    "crates/graph-store",
    "crates/ic-stable-csr",
    "crates/ic-stable-csr/bench",
    "crates/ic-stable-bitset",
    "crates/ic-stable-bitset/bench",
    "crates/ic-stable-roaring",
    "crates/ic-stable-roaring/bench",
    "crates/ic-stable-slot-map",
    "crates/ic-stable-vec-deque",
]
resolver = "2"

[workspace.package]
edition = "2024"
version = "0.1.0"
license = "MIT"

[workspace.dependencies]
ic-stable-bitset = { path = "crates/ic-stable-bitset" }
ic-stable-roaring = { path = "crates/ic-stable-roaring" }
ic-stable-csr = { path = "crates/ic-stable-csr" }
ic-stable-slot-map = { path = "crates/ic-stable-slot-map" }
ic-stable-vec-deque = { path = "crates/ic-stable-vec-deque" }

ic-stable-structures = "0.7.2"
canbench-rs = "0.4"
candid = "0.10"
concat-string = "1"
ethnum = "1"
ic-cdk = "0.20"
ic-cdk-macros = "0.20"
rapidhash = "4"
roaring = "0.11"
rust_decimal = "1"
serde = { version = "1", features = ["derive"] }
thiserror = "2"
